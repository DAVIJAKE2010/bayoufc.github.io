<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bayou FC - Blue Lock Rivals</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; }

    .music-bar {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 100px;
      padding: 10px 20px 10px 14px;
      margin-top: 22px;
      animation: fadeUp 0.8s 0.3s ease both;
    }
    .music-info { display: flex; flex-direction: column; line-height: 1.3; text-align: left; }
    .music-title { font-family: 'Orbitron', sans-serif; font-size: 0.65rem; letter-spacing: 1px; color: #fff; text-transform: uppercase; }
    .music-artist { font-size: 0.6rem; color: rgba(255,255,255,0.35); }
    .music-btn {
      width: 42px; height: 42px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.08);
      color: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      transition: background 0.2s, transform 0.15s;
    }
    .music-btn:hover { background: rgba(255,255,255,0.18); transform: scale(1.08); }
    .music-btn:active { transform: scale(0.96); }
    .music-btn svg { width: 16px; height: 16px; }
    .music-dot { width: 7px; height: 7px; border-radius: 50%; background: #fff; animation: blink 1.4s ease-in-out infinite; flex-shrink: 0; }
    .music-dot.paused { animation: none; opacity: 0.25; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.15; } }

    header { text-align: center; padding: 70px 20px 50px; position: relative; overflow: hidden; }
    header::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(255,255,255,0.06) 0%, transparent 70%); pointer-events: none; }
    .logo-wrap { display: inline-block; margin-bottom: 20px; }
    .logo-wrap img { width: 120px; height: 120px; object-fit: contain; filter: drop-shadow(0 0 24px rgba(255,255,255,0.25)); animation: floatLogo 4s ease-in-out infinite; }
    @keyframes floatLogo { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    header h1 { font-family: 'Orbitron', sans-serif; font-size: clamp(2rem, 6vw, 3.5rem); font-weight: 700; letter-spacing: 8px; text-transform: uppercase; color: #fff; margin-bottom: 8px; animation: fadeUp 0.8s ease both; }
    header p { font-size: 0.85rem; letter-spacing: 4px; text-transform: uppercase; color: rgba(255,255,255,0.4); animation: fadeUp 0.8s 0.15s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .divider { width: 60px; height: 1px; background: rgba(255,255,255,0.2); margin: 0 auto 50px; }
    .section { max-width: 900px; margin: 0 auto; padding: 0 20px 60px; }
    .section-title { font-family: 'Orbitron', sans-serif; font-size: 0.75rem; letter-spacing: 4px; text-transform: uppercase; color: rgba(255,255,255,0.35); text-align: center; margin-bottom: 28px; }
    .player-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }
    .card { border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; overflow: hidden; background: #111; cursor: pointer; transition: border-color 0.25s, transform 0.2s; }
    .card:hover { border-color: rgba(255,255,255,0.3); transform: translateY(-2px); }
    .card.open { border-color: rgba(255,255,255,0.5); }
    .card-img { position: relative; width: 100%; padding-top: 100%; background: #1a1a1a; overflow: hidden; }
    .card-img img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s ease; }
    .card:hover .card-img img { transform: scale(1.06); }
    .card-img .emoji-badge { position: absolute; top: 10px; right: 10px; font-size: 1.2rem; line-height: 1; }
    .card-body { padding: 14px 16px 12px; }
    .card-name { font-family: 'Orbitron', sans-serif; font-size: 0.8rem; font-weight: 600; letter-spacing: 1px; color: #fff; margin-bottom: 6px; text-transform: uppercase; }
    .card-toggle { font-size: 0.72rem; color: rgba(255,255,255,0.35); display: flex; align-items: center; gap: 5px; user-select: none; }
    .card-toggle svg { width: 12px; height: 12px; transition: transform 0.35s ease; flex-shrink: 0; }
    .card.open .card-toggle svg { transform: rotate(180deg); }
    .card-desc { max-height: 0; overflow: hidden; transition: max-height 0.45s ease; }
    .card.open .card-desc { max-height: 360px; }
    .card-desc-inner { padding: 0 16px 14px; border-top: 1px solid rgba(255,255,255,0.08); }
    .card-quote { font-size: 0.75rem; line-height: 1.7; color: rgba(255,255,255,0.55); margin-top: 12px; font-style: italic; }
    .card-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
    .tag { font-size: 0.6rem; font-family: 'Orbitron', sans-serif; letter-spacing: 0.5px; text-transform: uppercase; color: rgba(255,255,255,0.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 100px; padding: 3px 8px; background: rgba(255,255,255,0.03); }
    .honras-wrap { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
    .honra-pill { font-size: 0.75rem; font-family: 'Orbitron', sans-serif; letter-spacing: 1px; text-transform: uppercase; color: rgba(255,255,255,0.55); border: 1px solid rgba(255,255,255,0.12); border-radius: 100px; padding: 6px 14px; background: rgba(255,255,255,0.03); }
    footer { text-align: center; padding: 28px 20px; border-top: 1px solid rgba(255,255,255,0.07); font-size: 0.75rem; color: rgba(255,255,255,0.2); font-family: 'Orbitron', sans-serif; letter-spacing: 2px; }
  </style>
</head>
<body>

  <audio id="bgMusic" src="https://files.catbox.moe/0brc66.mp3" loop preload="auto"></audio>

  <header>
    <div class="logo-wrap">
      <img src="https://cdn.corenexis.com/f/SHhLrD08jHE.png" alt="Logo Bayou FC">
    </div>
    <h1>Bayou FC</h1>
    <p>Blue Lock Rivals</p>
    <div style="display:flex; justify-content:center; margin-top:4px;">
      <div class="music-bar">
        <button class="music-btn" id="musicBtn" aria-label="Play/Pause">
          <svg id="iconPlay" viewBox="0 0 24 24" fill="currentColor"><polygon points="6,3 20,12 6,21"/></svg>
          <svg id="iconPause" viewBox="0 0 24 24" fill="currentColor" display="none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        </button>
        <div class="music-info">
          <span class="music-title">Ball</span>
          <span class="music-artist">Jugsta</span>
        </div>
        <div class="music-dot paused" id="musicDot"></div>
      </div>
    </div>
  </header>

  <div class="divider"></div>

  <main class="section">
    <p class="section-title">Elenco Principal</p>
    <div class="player-grid" id="playerGrid"></div>
  </main>

  <div class="section" style="padding-top: 0;">
    <p class="section-title">Menções Honrosas ⭐</p>
    <div class="honras-wrap" id="honrasWrap"></div>
  </div>

  <footer>Bayou FC &copy; 2026 &mdash; Blue Lock Rivals</footer>

  <script>
    var audio = document.getElementById("bgMusic");
    var btn = document.getElementById("musicBtn");
    var dot = document.getElementById("musicDot");
    var iconPlay = document.getElementById("iconPlay");
    var iconPause = document.getElementById("iconPause");
    var playing = false;

    audio.volume = 0.4;

    function setPlaying(state) {
      playing = state;
      if (playing) {
        iconPlay.setAttribute("display", "none");
        iconPause.setAttribute("display", "");
        dot.classList.remove("paused");
      } else {
        iconPlay.setAttribute("display", "");
        iconPause.setAttribute("display", "none");
        dot.classList.add("paused");
      }
    }

    btn.addEventListener("click", function() {
      if (playing) { audio.pause(); setPlaying(false); }
      else { audio.play(); setPlaying(true); }
    });

    // ⭐ AUTOPLAY AO CLICAR NA PÁGINA (respeita regra do navegador)
    document.addEventListener("click", function startAudio() {
      if (!playing) { 
        audio.play().then(function() { 
          setPlaying(true); 
        }).catch(function() {
          console.log("Autoplay não permitido neste momento");
        }); 
      }
      document.removeEventListener("click", startAudio);
    }, { once: true });

    setPlaying(false);

    const players = [
      {
        name: "Bayou",
        emoji: "🦉",
        img: "https://cdn.corenexis.com/f/OpyRuw6sMZc.png",
        quote: "Minhas curvas não erram. O goleiro já sabe que vai tomar, só não sabe de que lado.",
        tags: ["Capitão", "Winger / CF", "Skillshot", "Top Rin", "1 OAT"]
      },
      {
        name: "Aspas",
        emoji: "🐶",
        img: "https://cdn.corenexis.com/f/DkqK720z4o2.png",
        quote: "O Chig não pensa, ele corre. Antes de você piscar, o gol já entrou.",
        tags: ["CF", "Melhor M1", "Best Chig", "Shidou"]
      },
      {
        name: "Less / form exe",
        emoji: "🔒",
        img: "https://cdn.corenexis.com/f/VHUXZwMBakh.png",
        quote: "Nenhuma bola passa enquanto eu estiver aqui. Pode armar, pode rezar.",
        tags: ["GK", "Winger Linha Chig", "Muralha", "Best Gagamaru", "Agro Kodiak"]
      },
      {
        name: "Kasee",
        emoji: "🦀",
        img: "https://cdn.corenexis.com/f/ib78mMkf6eI.png",
        quote: "A bola fica onde eu quero. Sempre. Sem exceção.",
        tags: ["Membro OG", "Winger Híbrido", "Best Nagi"]
      },
      {
        name: "Manel Gomes",
        emoji: "🔧",
        img: "https://cdn.corenexis.com/f/cpjcK43pwf0.png",
        quote: "Quando o time trava, eu apareço. Conserto tudo e sumo. Os que sabem, sabem.",
        tags: ["CM", "Winger Joker", "Best Don Lorenzo BLR"]
      },
      {
        name: "Winter",
        emoji: "🤝",
        img: "https://cdn.corenexis.com/f/q64E6Iukk9B.png",
        quote: "Bon:dade não é fraqueza. É o meu estilo de jogo.",
        tags: ["CM", "Iga Aiku", "Bon:dade"]
      },
      {
        name: "Shy",
        emoji: "🎭",
        img: "https://cdn.corenexis.com/f/sFP3FU4koSe.png",
        quote: "Eu me adapto ao que o jogo pede. Atacar, defender, não importa. O técnico do time faz o que for necessário.",
        tags: ["Winger Def", "SAE", "Charles", "Técnico do Time"]
      },
      {
        name: "Gengar",
        emoji: "😤",
        img: "https://cdn.corenexis.com/f/3v7APrrjJqZ.png",
        quote: "Pode me ignorar o jogo inteiro. Só não me ignore no momento que importa.",
        tags: ["Winger", "Nagi", "Decisivo", "Def + Ataque"]
      }
    ];

    const honras = ["Jonathan", "Gnom", "Kurona", "Shu", "Felps", "Crazy", "Killer", "Loiro"];
    const chevron = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>';

    const grid = document.getElementById("playerGrid");
    players.forEach(function(p) {
      var card = document.createElement("div");
      card.className = "card";
      var tagsHtml = p.tags.map(function(t) { return '<span class="tag">' + t + '</span>'; }).join('');
      card.innerHTML =
        '<div class="card-img">' +
          '<img src="' + p.img + '" alt="' + p.name + '" loading="lazy">' +
          (p.emoji ? '<span class="emoji-badge">' + p.emoji + '</span>' : '') +
        '</div>' +
        '<div class="card-body">' +
          '<p class="card-name">' + p.name + '</p>' +
          '<p class="card-toggle">' + chevron + ' ver descrição</p>' +
        '</div>' +
        '<div class="card-desc">' +
          '<div class="card-desc-inner">' +
            '<p class="card-quote">' + p.quote + '</p>' +
            '<div class="card-tags">' + tagsHtml + '</div>' +
          '</div>' +
        '</div>';
      card.addEventListener("click", function() {
        var isOpen = card.classList.contains("open");
        document.querySelectorAll(".card.open").forEach(function(c) { c.classList.remove("open"); });
        if (!isOpen) card.classList.add("open");
      });
      grid.appendChild(card);
    });

    var honrasWrap = document.getElementById("honrasWrap");
    honras.forEach(function(name) {
      var pill = document.createElement("span");
      pill.className = "honra-pill";
      pill.textContent = name;
      honrasWrap.appendChild(pill);
    });
  </script>

</body>
</html>
